<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日報</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐧</text></svg>">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      /* ゆめかわ背景: パステルピンク〜パステル紫〜パステル水色 */
      background: linear-gradient(135deg, #ffd1dc 0%, #e6e6fa 50%, #b5eaea 100%);
      background-attachment: fixed;
      color: #555;
    }
    
    /* ゆめかわカスタムスクロールバー */
    ::-webkit-scrollbar {
      width: 10px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.4);
      border-radius: 5px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 182, 193, 0.8);
      border-radius: 5px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 105, 180, 0.8);
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    .animate-float {
      animation: float 4s ease-in-out infinite;
    }
    @keyframes sparkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .animate-sparkle {
      animation: sparkle 2s ease-in-out infinite;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.5s ease-out forwards;
    }
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow {
      animation: spinSlow 8s linear infinite;
    }
    
    /* 入力フォームのプレースホルダー色 */
    ::placeholder {
      color: #d1d5db;
      opacity: 1;
    }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const appId = 'yumekawa-report-app';

    const callGeminiJSON = async (prompt, systemInstruction, schema) => {
      const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          systemInstruction: { parts: [{ text: systemInstruction }] },
          generationConfig: {
              responseMimeType: "application/json",
              responseSchema: schema
          }
      };
      // APIキーは空文字で自動補完される(※デモ環境やプロキシ用の設定の場合)
      // 注意：Gemini APIを直接ブラウザから叩く場合、通常はここに自分のAPIキーを入れる必要があります
      const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=`;
      const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      const result = await response.json();
      if (result.candidates && result.candidates.length > 0 &&
          result.candidates[0].content && result.candidates[0].content.parts &&
          result.candidates[0].content.parts.length > 0) {
          return JSON.parse(result.candidates[0].content.parts[0].text);
      }
      return null;
    };

    function App() {
      // データ状態 (LocalStorageから初期値を読み込む)
      const [currentTab, setCurrentTab] = useState('reports');
      const [reports, setReports] = useState(() => {
        const saved = localStorage.getItem(`${appId}_reports`);
        return saved ? JSON.parse(saved) : [];
      });
      const [mistakes, setMistakes] = useState(() => {
        const saved = localStorage.getItem(`${appId}_mistakes`);
        return saved ? JSON.parse(saved) : [];
      });
      const [searchQuery, setSearchQuery] = useState("");
      
      // UI状態
      const [selectedItemId, setSelectedItemId] = useState(null);
      const [isEditing, setIsEditing] = useState(false);
      const [mobileView, setMobileView] = useState('list');
      const [showDeleteModal, setShowDeleteModal] = useState(null);
      const [isGenerating, setIsGenerating] = useState(false);

      // 今日のタスク（ポップアップ）用状態
      const [showTodayTaskPopup, setShowTodayTaskPopup] = useState(false);
      const [latestActionPlan, setLatestActionPlan] = useState("");
      const initialLoadDone = useRef(false);

      // 分析状態
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [analysisResult, setAnalysisResult] = useState(null);

      // フォーム状態の初期値
      const initialReportForm = { date: '', title: '', taskDone: '', taskRemaining: '', actionPlan: '', content: '' };
      const initialMistakeForm = { date: '', title: '', taskName: '', mistakeWhat: '', mistakeWhy: '', mistakeHow: '' };
      const [formData, setFormData] = useState(initialReportForm);

      useEffect(() => {
        if (reports.length > 0) {
          // 最も新しい日付のレポートを探す
          const sortedReports = [...reports].sort((a, b) => new Date(b.date) - new Date(a.date));
          const latest = sortedReports[0];
          setLatestActionPlan(latest.actionPlan || '');

          // 初回ロード時のみ、朝7時を基準にした自動ポップアップ判定を行う
          if (!initialLoadDone.current) {
            initialLoadDone.current = true;
            const now = new Date();
            const today7am = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 7, 0, 0);
            const yesterday7am = new Date(today7am.getTime() - 24 * 60 * 60 * 1000);
            
            const resetTime = now >= today7am ? today7am : yesterday7am;
            const lastShownStr = localStorage.getItem('lastShownTodayTaskTime');
            const lastShownTime = lastShownStr ? new Date(parseInt(lastShownStr)) : new Date(0);
            
            if (lastShownTime < resetTime && latest.actionPlan) {
              setShowTodayTaskPopup(true);
              localStorage.setItem('lastShownTodayTaskTime', now.getTime().toString());
            }
          }
        } else {
          initialLoadDone.current = true;
        }
      }, [reports]);

      const currentDataList = currentTab === 'reports' ? reports : mistakes;

      const sortedData = useMemo(() => {
        return [...currentDataList].sort((a, b) => new Date(b.date) - new Date(a.date));
      }, [currentDataList]);

      const filteredData = useMemo(() => {
        if (!searchQuery) return sortedData;
        const lowerQ = searchQuery.toLowerCase();
        return sortedData.filter(item => {
          if (currentTab === 'reports') {
            return (item.title && item.title.toLowerCase().includes(lowerQ)) || 
                   (item.content && item.content.toLowerCase().includes(lowerQ)) ||
                   (item.taskDone && item.taskDone.toLowerCase().includes(lowerQ));
          } else {
            return (item.title && item.title.toLowerCase().includes(lowerQ)) || 
                   (item.taskName && item.taskName.toLowerCase().includes(lowerQ)) ||
                   (item.mistakeWhat && item.mistakeWhat.toLowerCase().includes(lowerQ));
          }
        });
      }, [sortedData, searchQuery, currentTab]);

      const groupedData = useMemo(() => {
        const groups = {};
        filteredData.forEach(item => {
          const d = new Date(item.date);
          if (isNaN(d)) return;
          const monthStr = `${d.getFullYear()}年${d.getMonth() + 1}月`;
          if (!groups[monthStr]) groups[monthStr] = [];
          groups[monthStr].push(item);
        });
        return groups;
      }, [filteredData]);

      const currentItem = useMemo(() => {
        if (selectedItemId === 'new') return null;
        return currentDataList.find(i => i.id === selectedItemId);
      }, [currentDataList, selectedItemId]);

      const handleTabChange = (tab) => {
        setCurrentTab(tab);
        setSelectedItemId(null);
        setIsEditing(false);
        setMobileView('list');
      };

      const handleCreateNew = () => {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        const defaultDate = `${yyyy}-${mm}-${dd}`;
        
        if (currentTab === 'reports') {
          setFormData({ ...initialReportForm, date: defaultDate });
        } else {
          setFormData({ ...initialMistakeForm, date: defaultDate });
        }
        
        setSelectedItemId('new');
        setIsEditing(true);
        setMobileView('form');
      };

      const handleSelectItem = (item) => {
        setSelectedItemId(item.id);
        setIsEditing(false);
        setMobileView('detail');
      };

      const handleEditClick = () => {
        if (currentItem) {
          if (currentTab === 'reports') {
            setFormData({ ...initialReportForm, ...currentItem });
          } else {
            setFormData({ ...initialMistakeForm, ...currentItem });
          }
          setIsEditing(true);
          setMobileView('form');
        }
      };

      const handleCancelEdit = () => {
        if (selectedItemId === 'new') {
          setSelectedItemId(null);
          setMobileView('list');
        } else {
          setIsEditing(false);
          setMobileView('detail');
        }
      };

      const handleSave = (e) => {
        e.preventDefault();
        if (!formData.date || !formData.title) return;
        
        const isReport = currentTab === 'reports';
        const collection = isReport ? reports : mistakes;
        const setCollection = isReport ? setReports : setMistakes;
        const storageKey = isReport ? `${appId}_reports` : `${appId}_mistakes`;
        
        let updatedCollection;

        if (selectedItemId && isEditing && selectedItemId !== 'new') {
          // 既存データの更新
          updatedCollection = collection.map(item => 
            item.id === selectedItemId ? { ...item, ...formData } : item
          );
        } else {
          // 新規データの追加
          const newItem = {
            ...formData,
            id: Date.now().toString(),
            timestamp: Date.now()
          };
          updatedCollection = [...collection, newItem];
        }

        setCollection(updatedCollection);
        localStorage.setItem(storageKey, JSON.stringify(updatedCollection)); // ブラウザに保存

        setSelectedItemId(isEditing && selectedItemId !== 'new' ? selectedItemId : updatedCollection[updatedCollection.length - 1].id);
        setIsEditing(false);
        setMobileView('detail');
      };

      const confirmDelete = () => {
        if (!showDeleteModal) return;
        
        const isReport = currentTab === 'reports';
        const collection = isReport ? reports : mistakes;
        const setCollection = isReport ? setReports : setMistakes;
        const storageKey = isReport ? `${appId}_reports` : `${appId}_mistakes`;

        const updatedCollection = collection.filter(item => item.id !== showDeleteModal);
        
        setCollection(updatedCollection);
        localStorage.setItem(storageKey, JSON.stringify(updatedCollection)); // ブラウザの設定を更新

        setShowDeleteModal(null);
        setSelectedItemId(null);
        setMobileView('list');
      };

      const handleFormatReportWithAI = async () => {
        setIsGenerating(true);
        try {
          const prompt = `以下の日報のメモを推敲し、ビジネスの場にもふさわしい綺麗で読みやすい文章に整形してください。内容は変えずに、言葉遣いや表現を整えてください。
          
          [その日行ったタスク]
          ${formData.taskDone || ''}
          
          [残っているタスク]
          ${formData.taskRemaining || ''}
          
          [明日のアクションプラン]
          ${formData.actionPlan || ''}
          
          [内容]
          ${formData.content || ''}`;

          const schema = {
            type: "OBJECT",
            properties: {
              "taskDone": { type: "STRING", description: "整形された その日行ったタスク" },
              "taskRemaining": { type: "STRING", description: "整形された 残っているタスク" },
              "actionPlan": { type: "STRING", description: "整形された 明日のアクションプラン" },
              "content": { type: "STRING", description: "整形された 内容" }
            }
          };

          const res = await callGeminiJSON(prompt, "あなたは優秀なアシスタントです。入力されたメモを適切な日本語に整形し、見やすいフォーマットで返してください。", schema);
          if(res) {
            setFormData(prev => ({ ...prev, ...res }));
          }
        } catch (e) {
          console.error(e);
        }
        setIsGenerating(false);
      };

      const handleSuggestSolutionWithAI = async () => {
        setIsGenerating(true);
        try {
          const prompt = `以下のミスの状況を元に、具体的で実行可能な改善策（解決策）を提案してください。ユーザーが思いつかない解決策のヒントを与えたいです。
          
          [ミスが行われたタスク]: ${formData.taskName || '未記入'}
          [どんなミスか]: ${formData.mistakeWhat || '未記入'}
          [なぜ起こったか]: ${formData.mistakeWhy || '未記入'}`;

          const schema = {
            type: "OBJECT",
            properties: {
              "suggestion": { type: "STRING", description: "提案する具体的な改善策・解決策" }
            }
          };

          const res = await callGeminiJSON(prompt, "あなたは優しくて優秀な業務サポートアシスタントです。ユーザーが落ち込まないように、前向きで具体的な解決策を1〜2つ提案してください。簡潔な文章でお願いします。", schema);
          if(res && res.suggestion) {
            setFormData(prev => {
              let currentHow = prev.mistakeHow || '';
              const marker = '【Geminiからの提案💡】';
              const markerIndex = currentHow.indexOf(marker);
              
              if (markerIndex !== -1) {
                currentHow = currentHow.substring(0, markerIndex).trim();
              }
              
              const separator = currentHow ? '\n\n' : '';
              return { 
                ...prev, 
                mistakeHow: currentHow + separator + marker + '\n' + res.suggestion 
              };
            });
          }
        } catch (e) {
          console.error(e);
        }
        setIsGenerating(false);
      };

      const handleAnalyzeMistakes = async () => {
        if (mistakes.length === 0) {
          alert("分析できるデータがまだないみたい！");
          return;
        }
        setMobileView('analysis');
        setIsAnalyzing(true);
        try {
          const dataToAnalyze = mistakes.map(m => ({
            task: m.taskName,
            what: m.mistakeWhat,
            why: m.mistakeWhy
          }));

          const prompt = `以下の過去のミスノートのデータを総合的に分析し、傾向と対策を整理してください。
          データ: ${JSON.stringify(dataToAnalyze)}
          
          ミスの傾向をいくつかの「テーマ（関連するミスや業務のくくり）」に分類し、どのような業務でどんなミスが起きやすいか、共通する注意点は何かを視覚的に整理しやすい形で出力してください。
          なお、タスク名に表記ゆれ（例：「携帯電話申請業務」と「携帯申請」など）がある場合は、同じ意味のタスクとして判断し、relatedTasksにまとめる際は代表的な名前に統合してください。`;

          const schema = {
            type: "OBJECT",
            properties: {
              "summary": { type: "STRING", description: "全体的なミスの傾向の要約（優しい口調で）" },
              "themes": {
                type: "ARRAY",
                description: "分類されたミスのテーマ（例：確認不足、連携ミス、手順の間違いなど）",
                items: {
                  type: "OBJECT",
                  properties: {
                    "themeName": { type: "STRING", description: "テーマ名" },
                    "description": { type: "STRING", description: "このテーマに関する傾向の分析と共通の対策" },
                    "relatedTasks": {
                      type: "ARRAY",
                      items: { type: "STRING" },
                      description: "このテーマに関連する代表的なタスク名のリスト"
                    }
                  }
                }
              },
              "advice": { type: "STRING", description: "今後のための前向きで総合的なアドバイス（優しい口調で）" }
            }
          };

          const res = await callGeminiJSON(prompt, "あなたは優しくて優秀な業務分析アシスタントです。ユーザーが前向きに業務改善できるよう、蓄積されたミスデータを統計的に整理し、テーマごとにまとめてください。", schema);
          if (res) {
            setAnalysisResult(res);
          }
        } catch (e) {
          console.error(e);
          setAnalysisResult({ error: "分析中にエラーが発生しちゃったみたい💦" });
        }
        setIsAnalyzing(false);
      };

      return (
        <div className="min-h-screen p-4 md:p-6 lg:p-10 flex items-center justify-center">
          <div className="w-full max-w-6xl h-[90vh] bg-white/60 backdrop-blur-xl rounded-[2.5rem] shadow-[0_20px_50px_rgba(255,182,193,0.3)] overflow-hidden flex flex-col md:flex-row border-2 border-white/70 relative">
            
            {/* 今日のタスク確認用ペンギンボタン */}
            <button 
              onClick={() => setShowTodayTaskPopup(true)}
              className="absolute top-4 right-4 md:top-6 md:right-6 w-12 h-12 bg-white/80 backdrop-blur-md rounded-full shadow-[0_4px_15px_rgba(255,182,193,0.4)] hover:shadow-[0_6px_20px_rgba(255,182,193,0.6)] flex items-center justify-center text-2xl z-30 border-2 border-pink-100 hover:scale-110 transition-transform"
              title="今日のタスクを確認"
            >
              🐧
            </button>
            
            {/* 左側サイドバー */}
            <div className={`md:w-80 lg:w-96 md:border-r-2 border-pink-100/50 flex flex-col bg-white/20 ${mobileView !== 'list' ? 'hidden md:flex' : 'flex flex-1'}`}>
              
              {/* タブ切り替え */}
              <div className="flex bg-white/40 p-2 border-b-2 border-white/50 mt-12 md:mt-0">
                 <button 
                   onClick={() => handleTabChange('reports')} 
                   className={`flex-1 py-2 text-sm lg:text-base font-bold rounded-2xl transition-colors ${currentTab === 'reports' ? 'bg-gradient-to-r from-pink-300 to-pink-400 text-white shadow-md' : 'text-gray-500 hover:bg-white/50'}`}
                 >
                   <i className="fa-solid fa-book-open mr-2"></i>日報
                 </button>
                 <button 
                   onClick={() => handleTabChange('mistakes')} 
                   className={`flex-1 py-2 text-sm lg:text-base font-bold rounded-2xl transition-colors ${currentTab === 'mistakes' ? 'bg-gradient-to-r from-cyan-300 to-blue-400 text-white shadow-md' : 'text-gray-500 hover:bg-white/50'}`}
                 >
                   <i className="fa-solid fa-triangle-exclamation mr-2"></i>ミスノート
                 </button>
              </div>

              {/* サイドバーヘッダー */}
              <div className="p-5 flex justify-between items-center border-b-2 border-white/50">
                <h1 className="text-xl lg:text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-purple-400 to-cyan-400 drop-shadow-sm flex items-center">
                  {currentTab === 'reports' ? 'My Reports' : 'Mistake Notes'}
                </h1>
                <button 
                  onClick={handleCreateNew} 
                  className={`text-white w-10 h-10 rounded-full shadow-md hover:shadow-lg flex items-center justify-center transform hover:scale-105 transition-all focus:outline-none ${currentTab === 'reports' ? 'bg-gradient-to-r from-pink-300 to-cyan-300' : 'bg-gradient-to-r from-cyan-300 to-blue-400'}`}
                  title="新しく書く"
                >
                  <i className="fa-solid fa-plus text-lg"></i>
                </button>
              </div>

              {/* 検索バー */}
              <div className="p-4 border-b-2 border-white/50 bg-white/10">
                <div className="relative">
                  <i className="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-pink-300"></i>
                  <input 
                    type="text" 
                    placeholder="キーワードでさがす..." 
                    value={searchQuery}
                    onChange={e => setSearchQuery(e.target.value)}
                    className="w-full pl-11 pr-4 py-2.5 bg-white/70 border-2 border-pink-100 rounded-full focus:outline-none focus:border-purple-300 focus:ring-2 focus:ring-purple-200 text-gray-600 font-medium transition-all shadow-inner"
                  />
                </div>
              </div>

              {/* ミスの傾向分析ボタン (Mistakesタブのみ) */}
              {currentTab === 'mistakes' && (
                <div className="px-4 pb-3 border-b-2 border-white/50 bg-white/10 flex justify-center">
                  <button
                    onClick={handleAnalyzeMistakes}
                    className="w-full py-2.5 bg-gradient-to-r from-indigo-300 to-purple-400 hover:from-indigo-400 hover:to-purple-500 text-white font-bold rounded-2xl shadow-sm hover:shadow-md transition-all flex items-center justify-center text-sm transform hover:-translate-y-0.5"
                  >
                    <i className="fa-solid fa-chart-pie mr-2"></i>ミスの傾向を分析・整理する
                  </button>
                </div>
              )}

              {/* リスト表示 */}
              <div className="flex-1 overflow-y-auto p-4 space-y-6">
                {Object.keys(groupedData).length === 0 ? (
                  <div className="text-center py-10 text-pink-300/80">
                    <i className="fa-solid fa-cloud text-4xl mb-3 animate-float"></i>
                    <p className="font-bold text-sm">見つからなかったよ💧</p>
                  </div>
                ) : (
                  Object.keys(groupedData).map(month => (
                    <div key={month}>
                      <h3 className="text-sm font-extrabold text-cyan-500 mb-3 pl-3 border-l-4 border-pink-300 flex items-center">
                        <i className="fa-solid fa-calendar-days mr-2 text-pink-300"></i>
                        {month}
                      </h3>
                      <div className="space-y-3">
                        {groupedData[month].map(item => {
                          const isSelected = selectedItemId === item.id && !isEditing && mobileView !== 'analysis';
                          return (
                            <div 
                              key={item.id} 
                              onClick={() => handleSelectItem(item)} 
                              className={`p-4 rounded-2xl cursor-pointer transition-all duration-300 border-2 ${
                                isSelected 
                                  ? 'bg-white border-pink-300 shadow-[0_4px_15px_rgba(255,182,193,0.4)] transform scale-[1.02]' 
                                  : 'bg-white/50 border-transparent hover:bg-white hover:shadow-md'
                              }`}
                            >
                               <div className="text-xs font-bold text-purple-400 mb-1 flex items-center">
                                 <i className="fa-solid fa-clock mr-1 opacity-70"></i>
                                 {item.date}
                               </div>
                               <div className="font-bold text-gray-700 truncate text-base">{item.title}</div>
                               {currentTab === 'mistakes' && item.taskName && (
                                 <div className="text-xs text-red-400 font-bold mt-1 truncate">
                                   タスク: {item.taskName}
                                 </div>
                               )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))
                )}
              </div>
            </div>

                    onClick={confirmDelete} 
                    className="flex-1 py-3 rounded-full bg-pink-400 text-white font-bold hover:bg-pink-500 transition-colors shadow-md transform hover:-translate-y-0.5"
                  >
                    消す
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
